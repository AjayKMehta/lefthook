# https://lefthook.dev/configuration/glob_matcher/
glob_matcher: doublestar

templates:
  build_config: Release

pre-push:
  parallel: true
  jobs:
    - name: check-dotnet
      tags: [dotnet, tests]
      glob:
        - "**/*.{cs,csproj,sln,slnx}"
        - "**/Directory.Build.props"
        - "**/Directory.Packages.props"
      group:
        piped: true
        jobs:
          - name: build-solution
            tags: [dotnet]
            run: dotnet build -c {build_config}
          - name: analyze-csharp
            tags: [lint, dotnet]
            skip:
              - run: test "${ANALYZE_DOTNET:-0}" -eq 0
            args: --severity error --verbosity normal --no-restore
            run: dotnet format analyzers --verify-no-changes
            timeout: 600s
          - name: run-tests
            tags: [test, dotnet]
            skip:
              - run: |
                    # Skip everything if SKIP_TESTS is 1
                    if [ "${SKIP_TESTS:-0}" -ne 1 ]; then
                      if ! dotnet test --list-tests --no-build -c "{build_config}" >/dev/null 2>&1; then
                        echo "Skipping tests: no runnable tests (or list failed)."
                      else
                        exit 1
                      fi
                    fi
            run: dotnet test --no-build -c {build_config}
            timeout: 300s
