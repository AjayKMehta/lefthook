templates:
  build_config: Release

pre-push:
  parallel: true
  jobs:
    - name: check-dotnet
      tags: [dotnet, tests]
      glob: "**/*.{cs,csproj,sln,slnx}"
      group:
        piped: true
        jobs:
          - name: build-solution
            run: dotnet build -c {build_config}
          - name: analyze-csharp
            tags: [lint, dotnet]
            args: --severity error --verbosity normal --no-restore
            run: dotnet format analyzers --verify-no-changes
            timeout: 60s
          - name: run-tests
            skip:
              - run: |
                    # Skip everything if SKIP_TESTS is 1
                    if [ "${SKIP_TESTS:-0}" -ne 1 ]; then
                      if ! dotnet test --list-tests --no-build -c "{build_config}" >/dev/null 2>&1; then
                        echo "Skipping tests: no runnable tests (or list failed)."
                      else
                        exit 1
                      fi
                    fi
            run: dotnet test --no-build -c {build_config}
            timeout: 300s
