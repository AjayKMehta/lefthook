# https://lefthook.dev/configuration/glob_matcher/
glob_matcher: doublestar

min_version: 2.1.0

pre-commit:
  parallel: true
  jobs:
    - name: format-csharp
      glob: "**/*.cs"
      tags: [format, dotnet]
      args: --severity warn --verbosity normal
      run: dotnet format --verify-no-changes --include {staged_files}
      timeout: 30s
