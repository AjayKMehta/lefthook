pre-commit:
  parallel: true
  jobs:
    - name: lint-vscode
      tags: [lint, vscode]
      glob: .vscode/settings.json
      args: --compact -r --enforce-double-quotes -p --sort-keys-ignore-case
      run: npx jsonlint {staged_files} -C --no-duplicate-keys --quiet --continue --in-place --mode cjson
      stage_fixed: true
