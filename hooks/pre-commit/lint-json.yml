# https://lefthook.dev/configuration/glob_matcher/
glob_matcher: doublestar

min_version: 2.1.0

pre-commit:
  parallel: true
  jobs:
    - name: lint-json
      glob: "*.json"
      exclude:
        - .vscode/settings.json
        - '**/packages.lock.json'
        - '**/package-lock.json'
      tags: [lint, json]
      args: --compact -r --enforce-double-quotes -p
      run: npx jsonlint {staged_files} -C --quiet --continue --in-place
      stage_fixed: true
      timeout: 20s
