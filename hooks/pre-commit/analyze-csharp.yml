min_version: 2.1.0

pre-commit:
  parallel: true
  jobs:
    - name: analyze-csharp
      glob: "**/*.{cs,csproj,sln,slnx}"
      tags: [lint, dotnet]
      args: --severity error --verbosity normal --no-restore
      run: dotnet format analyzers --verify-no-changes --include {staged_files}
      timeout: 30s
