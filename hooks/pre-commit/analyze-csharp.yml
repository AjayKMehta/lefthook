# https://lefthook.dev/configuration/glob_matcher/
glob_matcher: doublestar

min_version: 2.1.0

pre-commit:
  parallel: true
  jobs:
    - name: analyze-csharp
      tags: [lint, dotnet]
      skip:
        - run: test "${ANALYZE_DOTNET:-0}" -eq 0
      glob: "**/*.{cs,csproj,sln,slnx}"
      args: --severity error --verbosity normal --no-restore
      run: dotnet format analyzers --verify-no-changes --include {staged_files}
      timeout: 30s
